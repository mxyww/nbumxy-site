<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>第二章：认识的本质及其发展规律 - 练习题</title>
  <style>
    :root {
      --primary-color: #C62828;
      --primary-light: #FFCDD2;
      --secondary-color: #1565C0;
      --success-color: #2E7D32;
      --error-color: #C62828;
      --warning-color: #F9A825;
      --dark-color: #212121;
      --light-color: #FAFAFA;
      --gray-color: #757575;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --shadow-hover: 0 20px 40px rgba(0, 0, 0, 0.12);
      --transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.1);
      --radius: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #fdfbf7 0%, #f5f0e8 100%);
      min-height: 100vh;
      color: var(--dark-color);
      padding: 20px;
    }

    .header {
      max-width: 1000px;
      margin: 0 auto 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: white;
      color: var(--primary-color);
      text-decoration: none;
      border-radius: var(--radius);
      font-weight: 600;
      box-shadow: var(--shadow);
      transition: var(--transition);
    }

    .back-btn:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
    }

    .page-title {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 30px;
    }

    .question-container {
      background: white;
      border-radius: var(--radius);
      padding: 40px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .question-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 6px;
      background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
    }

    .progress-container { margin-bottom: 30px; }

    .progress-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .progress-label { font-size: 14px; color: var(--gray-color); }

    .progress-bar {
      height: 8px;
      background: var(--light-color);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
      border-radius: 4px;
      width: 0%;
      transition: width 0.5s ease;
    }

    .question-header { margin-bottom: 30px; }

    .question-number {
      font-size: 14px;
      color: var(--primary-color);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .question-title { font-size: 22px; line-height: 1.5; margin-bottom: 10px; }

    .question-difficulty {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 5px;
    }

    .difficulty-easy { background: rgba(46, 125, 50, 0.1); color: #2E7D32; }
    .difficulty-medium { background: rgba(249, 168, 37, 0.1); color: #F9A825; }
    .difficulty-hard { background: rgba(198, 40, 40, 0.1); color: #C62828; }

    .options-container { margin: 30px 0; }

    .option {
      padding: 18px 20px;
      background: var(--light-color);
      border-radius: var(--radius);
      margin-bottom: 15px;
      cursor: pointer;
      transition: var(--transition);
      border: 2px solid transparent;
      display: flex;
      align-items: center;
    }

    .option:hover {
      background: white;
      border-color: var(--primary-light);
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
    }

    .option.selected { border-color: var(--primary-color); background: var(--primary-light); }
    .option.correct { border-color: var(--success-color); background: rgba(46, 125, 50, 0.1); }
    .option.incorrect { border-color: var(--error-color); background: rgba(198, 40, 40, 0.1); }

    .option-letter {
      width: 36px;
      height: 36px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 15px;
      font-weight: 700;
      color: var(--dark-color);
      border: 2px solid var(--light-color);
      transition: var(--transition);
    }

    .option:hover .option-letter { border-color: var(--primary-color); background: var(--primary-color); color: white; }
    .option.selected .option-letter { background: var(--primary-color); color: white; border-color: var(--primary-color); }
    .option.correct .option-letter { background: var(--success-color); color: white; border-color: var(--success-color); }
    .option.incorrect .option-letter { background: var(--error-color); color: white; border-color: var(--error-color); }

    .option-text { flex: 1; font-size: 16px; }

    .feedback-container {
      margin: 30px 0;
      padding: 20px;
      border-radius: var(--radius);
      display: none;
      animation: fadeIn 0.5s ease;
    }

    .feedback-container.show { display: block; }
    .feedback-correct { background: rgba(46, 125, 50, 0.1); border-left: 4px solid var(--success-color); }
    .feedback-incorrect { background: rgba(198, 40, 40, 0.1); border-left: 4px solid var(--error-color); }

    .feedback-header { display: flex; align-items: center; margin-bottom: 10px; }

    .feedback-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 12px;
      font-size: 18px;
      flex-shrink: 0;
    }

    .feedback-correct .feedback-icon { background: var(--success-color); color: white; }
    .feedback-incorrect .feedback-icon { background: var(--error-color); color: white; }
    .feedback-title { font-weight: 700; font-size: 18px; }

    .feedback-explanation {
      margin-top: 10px;
      font-size: 15px;
      line-height: 1.6;
      color: var(--dark-color);
    }

    .controls { display: flex; justify-content: space-between; margin-top: 30px; }

    .btn {
      padding: 14px 32px;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary { background: var(--primary-color); color: white; }
    .btn-primary:hover:not(:disabled) { background: #8E0000; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(198, 40, 40, 0.3); }
    .btn-secondary { background: var(--light-color); color: var(--dark-color); }
    .btn-secondary:hover { background: #e0e0e0; transform: translateY(-3px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

    .sidebar { display: flex; flex-direction: column; gap: 25px; }

    .stats-card, .hint-card, .navigation-card {
      background: white;
      border-radius: var(--radius);
      padding: 25px;
      box-shadow: var(--shadow);
    }

    .stats-card { border-top: 6px solid var(--primary-color); }
    .hint-card { border-top: 6px solid var(--warning-color); }
    .navigation-card { border-top: 6px solid var(--success-color); }

    .card-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-title i { font-size: 20px; }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

    .stat-item {
      text-align: center;
      padding: 15px;
      background: var(--light-color);
      border-radius: var(--radius);
    }

    .stat-value { font-size: 24px; font-weight: 700; color: var(--primary-color); display: block; }
    .stat-label { font-size: 13px; color: var(--gray-color); display: block; margin-top: 5px; }

    .hint-content { font-size: 14px; line-height: 1.6; color: var(--dark-color); }

    .question-list { max-height: 300px; overflow-y: auto; margin-top: 10px; }

    .question-nav-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 15px;
      background: var(--light-color);
      border-radius: var(--radius);
      margin-bottom: 10px;
      cursor: pointer;
      transition: var(--transition);
    }

    .question-nav-item:hover { background: #e0e0e0; }
    .question-nav-item.active { background: var(--primary-light); border-left: 4px solid var(--primary-color); }
    .question-nav-number { font-weight: 600; color: var(--dark-color); }

    .question-nav-status {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--light-color);
    }

    .question-nav-status.correct { background: var(--success-color); }
    .question-nav-status.incorrect { background: var(--error-color); }
    .question-nav-status.current { background: var(--primary-color); }

    .completion-screen {
      max-width: 800px;
      margin: 50px auto;
      background: white;
      border-radius: var(--radius);
      padding: 50px;
      text-align: center;
      box-shadow: var(--shadow);
      animation: fadeIn 0.8s ease;
    }

    .completion-icon { font-size: 80px; color: var(--success-color); margin-bottom: 20px; animation: bounce 1s ease; }
    .completion-title { font-size: 32px; font-weight: 700; margin-bottom: 15px; color: var(--dark-color); }
    .completion-subtitle { font-size: 18px; color: var(--gray-color); margin-bottom: 40px; }

    .completion-stats { display: flex; justify-content: center; gap: 30px; margin-bottom: 40px; }

    .completion-stat-item {
      padding: 25px;
      background: var(--light-color);
      border-radius: var(--radius);
      min-width: 150px;
    }

    .completion-stat-value { font-size: 36px; font-weight: 700; color: var(--primary-color); display: block; }
    .completion-stat-label { font-size: 16px; color: var(--gray-color); margin-top: 8px; display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-20px); }
      60% { transform: translateY(-10px); }
    }

    @media (max-width: 900px) {
      .container { grid-template-columns: 1fr; }
      .sidebar { order: -1; }
    }

    @media (max-width: 768px) {
      .question-container { padding: 25px; }
      .controls { flex-direction: column; gap: 15px; }
      .btn { width: 100%; justify-content: center; }
      .completion-stats { flex-direction: column; align-items: center; }
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="header">
    <a href="index.html" class="back-btn">
      <i class="fas fa-arrow-left"></i>
      返回首页
    </a>
    <h1 class="page-title">认识的本质及其发展规律</h1>
  </div>

  <div class="container">
    <div class="question-container">
      <div class="progress-container">
        <div class="progress-header">
          <span class="progress-label">进度</span>
          <span class="progress-label" id="progressText">0/0</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="question-header">
        <div class="question-number" id="questionNumber">第 0 题</div>
        <h2 class="question-title" id="questionTitle">题目将在这里显示</h2>
        <div class="question-difficulty difficulty-medium" id="questionDifficulty">中等难度</div>
      </div>

      <div class="options-container" id="optionsContainer"></div>

      <div class="feedback-container" id="feedbackContainer">
        <div class="feedback-header">
          <div class="feedback-icon" id="feedbackIcon"></div>
          <div class="feedback-title" id="feedbackTitle"></div>
        </div>
        <div class="feedback-explanation" id="feedbackExplanation"></div>
      </div>

      <div class="controls">
        <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()" disabled>
          <i class="fas fa-arrow-left"></i>
          上一题
        </button>
        <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">
          下一题
          <i class="fas fa-arrow-right"></i>
        </button>
      </div>
    </div>

    <div class="sidebar">
      <div class="stats-card">
        <div class="card-title">
          <i class="fas fa-chart-bar" style="color: var(--primary-color);"></i>
          学习统计
        </div>
        <div class="stats-grid">
          <div class="stat-item">
            <span class="stat-value" id="answeredCount">0</span>
            <span class="stat-label">已答题</span>
          </div>
          <div class="stat-item">
            <span class="stat-value" id="correctCount">0</span>
            <span class="stat-label">正确数</span>
          </div>
          <div class="stat-item">
            <span class="stat-value" id="accuracyRate">0%</span>
            <span class="stat-label">正确率</span>
          </div>
          <div class="stat-item">
            <span class="stat-value" id="remainingCount">0</span>
            <span class="stat-label">剩余题</span>
          </div>
        </div>
      </div>

      <div class="hint-card">
        <div class="card-title">
          <i class="fas fa-lightbulb" style="color: var(--warning-color);"></i>
          答题提示
        </div>
        <div class="hint-content">
          <p>一、点击选项选择答案</p>
          <p>二、系统会自动判断对错</p>
          <p>三、点击"下一题"继续答题</p>
          <p>四、右侧可查看答题进度</p>
        </div>
      </div>

      <div class="navigation-card">
        <div class="card-title">
          <i class="fas fa-list-ol" style="color: var(--success-color);"></i>
          题目导航
        </div>
        <div class="question-list" id="questionNav"></div>
      </div>
    </div>
  </div>

  <div class="completion-screen" id="completionScreen" style="display: none;">
    <div class="completion-icon">🎉</div>
    <h2 class="completion-title">恭喜完成题库练习！</h2>
    <p class="completion-subtitle">你已经完成了所有题目，继续加油！</p>

    <div class="completion-stats">
      <div class="completion-stat-item">
        <span class="completion-stat-value" id="finalCorrectCount">0</span>
        <span class="completion-stat-label">正确题数</span>
      </div>
      <div class="completion-stat-item">
        <span class="completion-stat-value" id="finalTotalCount">0</span>
        <span class="completion-stat-label">总题数</span>
      </div>
      <div class="completion-stat-item">
        <span class="completion-stat-value" id="finalAccuracyRate">0%</span>
        <span class="completion-stat-label">正确率</span>
      </div>
    </div>

    <div class="controls">
      <a href="index.html" class="btn btn-secondary">
        <i class="fas fa-home"></i>
        返回首页
      </a>
      <button class="btn btn-primary" onclick="restartQuiz()">
        <i class="fas fa-redo"></i>
        重新开始
      </button>
    </div>
  </div>

  <script>
    const questions = [
  {
    id: 1,
    title: "马克思主义认识论的首要的和基本的观点是？",
    options: ["矛盾的观点", "实践的观点", "联系的观点", "发展的观点"],
    answer: 1,
    explanation: "实践的观点是马克思主义认识论的首要的和基本的观点。实践是认识的基础，对认识具有决定作用。",
    tag: "实践与认识",
    difficulty: "easy"
  },
  {
    id: 2,
    title: "认识的主体是指？",
    options: ["一切有生命的人", "能够进行思维活动的人", "处于一定社会关系中从事实践活动的人", "具有主观能动性的一切生物"],
    answer: 2,
    explanation: "认识的主体是处于一定社会关系中从事实践活动和认识活动的人。",
    tag: "认识主体",
    difficulty: "easy"
  },
  {
    id: 3,
    title: "认识的客体是指？",
    options: ["客观存在的一切事物", "进入人的实践活动范围并与主体发生联系的那部分客观对象", "人的主观意识", "自然界的所有事物"],
    answer: 1,
    explanation: "认识的客体是进入人的实践活动范围，同认识主体发生联系的那部分客观对象。",
    tag: "认识客体",
    difficulty: "medium"
  },
  {
    id: 4,
    title: "实践是检验真理的唯一标准，这是由？",
    options: ["实践的主观性决定的", "实践的社会性决定的", "真理的本性和实践的特点决定的", "实践的客观性决定的"],
    answer: 2,
    explanation: "实践是检验真理的唯一标准，这是由真理的本性（主观与客观相符合）和实践的特点（直接现实性）决定的。",
    tag: "真理检验标准",
    difficulty: "medium"
  },
  {
    id: 5,
    title: "感性认识和理性认识的辩证关系是？",
    options: ["感性认识是理性认识的基础，理性认识依赖于感性认识", "理性认识是感性认识的基础", "感性认识和理性认识是完全对立的", "感性认识可以直接上升到理性认识"],
    answer: 0,
    explanation: "感性认识是理性认识的基础，理性认识依赖于感性认识；感性认识有待于发展到理性认识。",
    tag: "感性理性",
    difficulty: "easy"
  },
  {
    id: 6,
    title: "真理的客观性是指？",
    options: ["真理是客观事物本身", "真理的内容是客观的", "真理是客观精神的产物", "真理的形式是客观的"],
    answer: 1,
    explanation: "真理的客观性是指真理的内容是对客观事物及其规律的正确反映，真理中包含着不依赖于人和人的意识的客观内容。",
    tag: "真理观",
    difficulty: "easy"
  },
  {
    id: 7,
    title: "绝对真理和相对真理是？",
    options: ["两种完全不同的真理", "同一个真理的两个不同属性", "互不包含的两种真理", "绝对真理是真理，相对真理不是真理"],
    answer: 1,
    explanation: "绝对真理和相对真理是同一个客观真理的两个不同属性，任何真理既是绝对的又是相对的。",
    tag: "真理观",
    difficulty: "medium"
  },
  {
    id: 8,
    title: "从认识到实践的飞跃，是认识过程的？",
    options: ["第一次飞跃", "第二次飞跃", "更重要的飞跃，因为认识世界的目的是为了改造世界", "不重要的飞跃"],
    answer: 2,
    explanation: "从认识到实践的飞跃，是认识过程的第二次飞跃，也是更为重要的飞跃，因为认识世界的目的是改造世界。",
    tag: "认识过程",
    difficulty: "medium"
  },
  {
    id: 9,
    title: "实践的特点不包括？",
    options: ["客观实在性", "自觉能动性", "社会历史性", "主观随意性"],
    answer: 3,
    explanation: "实践具有客观实在性、自觉能动性和社会历史性，不具有主观随意性。",
    tag: "实践特点",
    difficulty: "easy"
  },
  {
    id: 10,
    title: "辩证唯物主义认识论与唯心主义认识论的根本区别在于？",
    options: ["是否承认世界的可知性", "是否承认反映论", "是否坚持实践的观点", "是否承认真理的绝对性"],
    answer: 1,
    explanation: "辩证唯物主义认识论坚持能动的反映论，认为认识是主体对客体的能动反映。唯心主义则否认反映论。",
    tag: "认识论",
    difficulty: "hard"
  },
  {
    id: 11,
    title: "感性认识的三种形式是？",
    options: ["概念、判断、推理", "感觉、知觉、表象", "归纳、演绎、类比", "分析、综合、抽象"],
    answer: 1,
    explanation: "感性认识的基本形式是感觉、知觉和表象。",
    tag: "感性认识",
    difficulty: "easy"
  },
  {
    id: 12,
    title: "理性认识的三种形式是？",
    options: ["感觉、知觉、表象", "分析、综合、抽象", "概念、判断、推理", "归纳、演绎、类比"],
    answer: 2,
    explanation: "理性认识的基本形式是概念、判断和推理。",
    tag: "理性认识",
    difficulty: "easy"
  },
  {
    id: 13,
    title: ""真理和谬误在一定条件下可以相互转化"说明？",

    let currentQuestionIndex = 0;
    let userAnswers = [];
    let quizCompleted = false;

    const questionTitleEl = document.getElementById('questionTitle');
    const questionNumberEl = document.getElementById('questionNumber');
    const questionDifficultyEl = document.getElementById('questionDifficulty');
    const optionsContainerEl = document.getElementById('optionsContainer');
    const feedbackContainerEl = document.getElementById('feedbackContainer');
    const feedbackIconEl = document.getElementById('feedbackIcon');
    const feedbackTitleEl = document.getElementById('feedbackTitle');
    const feedbackExplanationEl = document.getElementById('feedbackExplanation');
    const prevBtnEl = document.getElementById('prevBtn');
    const nextBtnEl = document.getElementById('nextBtn');
    const progressFillEl = document.getElementById('progressFill');
    const progressTextEl = document.getElementById('progressText');
    const answeredCountEl = document.getElementById('answeredCount');
    const correctCountEl = document.getElementById('correctCount');
    const accuracyRateEl = document.getElementById('accuracyRate');
    const remainingCountEl = document.getElementById('remainingCount');
    const questionNavEl = document.getElementById('questionNav');
    const completionScreenEl = document.getElementById('completionScreen');
    const finalCorrectCountEl = document.getElementById('finalCorrectCount');
    const finalTotalCountEl = document.getElementById('finalTotalCount');
    const finalAccuracyRateEl = document.getElementById('finalAccuracyRate');

    function init() {
      if (questions.length === 0) {
        questionTitleEl.textContent = "题库正在建设中，请稍后...";
        optionsContainerEl.innerHTML = "<p style='color: var(--gray-color); text-align: center; padding: 40px;'>请先在代码的questions数组中添加题目</p>";
        nextBtnEl.disabled = true;
        prevBtnEl.disabled = true;
        return;
      }

      userAnswers = new Array(questions.length).fill(null);
      loadQuestion();
      updateStats();
      generateQuestionNav();
    }

    function loadQuestion() {
      const question = questions[currentQuestionIndex];

      questionTitleEl.innerHTML = question.title;
      questionNumberEl.textContent = `第 ${currentQuestionIndex + 1} 题`;

      questionDifficultyEl.textContent =
        question.difficulty === 'easy' ? '简单难度' :
        question.difficulty === 'medium' ? '中等难度' : '困难难度';
      questionDifficultyEl.className = `question-difficulty difficulty-${question.difficulty}`;

      optionsContainerEl.innerHTML = '';

      question.options.forEach((option, index) => {
        const optionDiv = document.createElement('div');
        optionDiv.className = 'option';

        if (userAnswers[currentQuestionIndex] !== null) {
          if (index === question.answer) {
            optionDiv.classList.add('correct');
          } else if (index === userAnswers[currentQuestionIndex] && userAnswers[currentQuestionIndex] !== question.answer) {
            optionDiv.classList.add('incorrect');
          }
          if (index === userAnswers[currentQuestionIndex]) {
            optionDiv.classList.add('selected');
          }
        }

        const optionLetter = document.createElement('div');
        optionLetter.className = 'option-letter';
        optionLetter.textContent = String.fromCharCode(65 + index);

        const optionText = document.createElement('div');
        optionText.className = 'option-text';
        optionText.innerHTML = option;

        optionDiv.appendChild(optionLetter);
        optionDiv.appendChild(optionText);

        if (userAnswers[currentQuestionIndex] === null) {
          optionDiv.onclick = () => selectAnswer(optionDiv, index);
        }

        optionsContainerEl.appendChild(optionDiv);
      });

      if (userAnswers[currentQuestionIndex] !== null) {
        showFeedback();
      } else {
        feedbackContainerEl.classList.remove('show');
      }

      prevBtnEl.disabled = currentQuestionIndex === 0;
      nextBtnEl.textContent = currentQuestionIndex === questions.length - 1 ? '完成答题' : '下一题';

      updateProgress();
      updateQuestionNav();
    }

    function selectAnswer(optionElement, answerIndex) {
      const question = questions[currentQuestionIndex];

      const options = document.querySelectorAll('.option');
      options.forEach(option => {
        option.onclick = null;
      });

      optionElement.classList.add('selected');
      userAnswers[currentQuestionIndex] = answerIndex;

      if (answerIndex === question.answer) {
        optionElement.classList.add('correct');
      } else {
        optionElement.classList.add('incorrect');
        const correctOption = options[question.answer];
        correctOption.classList.add('correct');
      }

      showFeedback();
      updateStats();
      updateQuestionNav();
    }

    function showFeedback() {
      const question = questions[currentQuestionIndex];
      const userAnswer = userAnswers[currentQuestionIndex];
      const isCorrect = userAnswer === question.answer;

      feedbackIconEl.innerHTML = isCorrect ? '✓' : '✗';
      feedbackTitleEl.textContent = isCorrect ? '回答正确！' : '回答错误';
      feedbackExplanationEl.textContent = question.explanation;

      feedbackContainerEl.className = `feedback-container ${isCorrect ? 'feedback-correct' : 'feedback-incorrect'}`;
      feedbackContainerEl.classList.add('show');
    }

    function prevQuestion() {
      if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        loadQuestion();
      }
    }

    function nextQuestion() {
      if (userAnswers[currentQuestionIndex] === null) {
        alert('请先选择答案');
        return;
      }

      if (currentQuestionIndex < questions.length - 1) {
        currentQuestionIndex++;
        loadQuestion();
      } else {
        showCompletionScreen();
      }
    }

    function showCompletionScreen() {
      document.querySelector('.container').style.display = 'none';
      completionScreenEl.style.display = 'block';

      const totalQuestions = questions.length;
      const correctAnswers = userAnswers.filter((answer, index) => answer === questions[index].answer).length;
      const accuracy = totalQuestions > 0 ? Math.round((correctAnswers / totalQuestions) * 100) : 0;

      finalCorrectCountEl.textContent = correctAnswers;
      finalTotalCountEl.textContent = totalQuestions;
      finalAccuracyRateEl.textContent = `${accuracy}%`;

      quizCompleted = true;
    }

    function restartQuiz() {
      currentQuestionIndex = 0;
      userAnswers = new Array(questions.length).fill(null);
      quizCompleted = false;

      completionScreenEl.style.display = 'none';
      document.querySelector('.container').style.display = 'grid';

      loadQuestion();
      updateStats();
      updateQuestionNav();
    }

    function updateProgress() {
      const progressPercentage = ((currentQuestionIndex + 1) / questions.length) * 100;
      progressFillEl.style.width = `${progressPercentage}%`;
      progressTextEl.textContent = `${currentQuestionIndex + 1}/${questions.length}`;
    }

    function updateStats() {
      const totalQuestions = questions.length;
      const answeredQuestions = userAnswers.filter(answer => answer !== null).length;
      const correctAnswers = userAnswers.filter((answer, index) => answer === questions[index].answer).length;
      const accuracy = answeredQuestions > 0 ? Math.round((correctAnswers / answeredQuestions) * 100) : 0;
      const remainingQuestions = totalQuestions - answeredQuestions;

      answeredCountEl.textContent = answeredQuestions;
      correctCountEl.textContent = correctAnswers;
      accuracyRateEl.textContent = `${accuracy}%`;
      remainingCountEl.textContent = remainingQuestions;
    }

    function generateQuestionNav() {
      questionNavEl.innerHTML = '';

      questions.forEach((question, index) => {
        const navItem = document.createElement('div');
        navItem.className = 'question-nav-item';

        if (index === currentQuestionIndex) {
          navItem.classList.add('active');
        }

        navItem.onclick = () => {
          if (quizCompleted || userAnswers[index] !== null || index === currentQuestionIndex + 1) {
            currentQuestionIndex = index;
            loadQuestion();
          } else {
            alert('请按顺序答题');
          }
        };

        const navNumber = document.createElement('div');
        navNumber.className = 'question-nav-number';
        navNumber.textContent = `第 ${index + 1} 题`;

        const navStatus = document.createElement('div');
        navStatus.className = 'question-nav-status';

        if (userAnswers[index] !== null) {
          navStatus.classList.add(userAnswers[index] === question.answer ? 'correct' : 'incorrect');
        } else if (index === currentQuestionIndex) {
          navStatus.classList.add('current');
        }

        navItem.appendChild(navNumber);
        navItem.appendChild(navStatus);
        questionNavEl.appendChild(navItem);
      });
    }

    function updateQuestionNav() {
      const navItems = document.querySelectorAll('.question-nav-item');

      navItems.forEach((item, index) => {
        if (index === currentQuestionIndex) {
          item.classList.add('active');
        } else {
          item.classList.remove('active');
        }

        const statusIndicator = item.querySelector('.question-nav-status');
        statusIndicator.className = 'question-nav-status';

        if (userAnswers[index] !== null) {
          statusIndicator.classList.add(userAnswers[index] === questions[index].answer ? 'correct' : 'incorrect');
        } else if (index === currentQuestionIndex) {
          statusIndicator.classList.add('current');
        }
      });
    }

    document.addEventListener('keydown', function(e) {
      if (completionScreenEl.style.display === 'block') return;

      if (e.key >= '1' && e.key <= '4' && userAnswers[currentQuestionIndex] === null) {
        const optionIndex = parseInt(e.key) - 1;
        const options = document.querySelectorAll('.option');

        if (optionIndex < options.length) {
          options[optionIndex].click();
        }
      }

      if ((e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') && currentQuestionIndex > 0) {
        prevQuestion();
      }

      if ((e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D')) {
        if (currentQuestionIndex < questions.length - 1) {
          nextQuestion();
        } else if (userAnswers[currentQuestionIndex] !== null) {
          nextQuestion();
        }
      }

      if ((e.key === ' ' || e.key === 'Enter') && userAnswers[currentQuestionIndex] !== null) {
        if (currentQuestionIndex < questions.length - 1) {
          nextQuestion();
        } else {
          nextQuestion();
        }
      }
    });

    window.onload = init;
  </script>
</body>
