  <title>第七章：全面从严治党 - 练习题</title>
  <style>
    :root {
      --primary-color: #C62828;
      --primary-light: #FFEBEE;
      --secondary-color: #D32F2F;
      --success-color: #2E7D32;
      --error-color: #B71C1C;
      --warning-color: #FFA000;
      --dark-color: #212121;
      --light-color: #FAFAFA;
      --gray-color: #757575;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --shadow-hover: 0 20px 40px rgba(0, 0, 0, 0.12);
      --transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.1);
      --radius: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #fff8f8 0%, #ffebee 100%);
      min-height: 100vh;
      color: var(--dark-color);
      padding: 20px;
    }
    .header {
      max-width: 1000px;
      margin: 0 auto 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: white;
      color: var(--primary-color);
      text-decoration: none;
      border-radius: var(--radius);
      font-weight: 600;
      box-shadow: var(--shadow);
      transition: var(--transition);
    }
    .back-btn:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
    }
    .page-title {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 30px;
    }
    .question-container {
      background: white;
      border-radius: var(--radius);
      padding: 40px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }
    .question-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 6px;
      background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
    }
    .progress-container { margin-bottom: 30px; }
    .progress-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
    .progress-label { font-size: 14px; color: var(--gray-color); }
    .progress-bar { height: 8px; background: var(--light-color); border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(to right, var(--primary-color), var(--secondary-color)); border-radius: 4px; width: 0%; transition: width 0.5s ease; }
    .question-header { margin-bottom: 30px; }
    .question-number { font-size: 14px; color: var(--primary-color); font-weight: 600; margin-bottom: 8px; }
    .question-title { font-size: 22px; line-height: 1.5; margin-bottom: 10px; }
    .question-difficulty { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-top: 5px; }
    .difficulty-easy { background: rgba(46, 125, 50, 0.1); color: #2E7D32; }
    .difficulty-medium { background: rgba(255, 160, 0, 0.1); color: #FFA000; }
    .difficulty-hard { background: rgba(198, 40, 40, 0.1); color: #C62828; }
    .options-container { margin: 30px 0; }
    .option { padding: 18px 20px; background: var(--light-color); border-radius: var(--radius); margin-bottom: 15px; cursor: pointer; transition: var(--transition); border: 2px solid transparent; display: flex; align-items: center; }
    .option:hover { background: white; border-color: var(--primary-light); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05); }
    .option.selected { border-color: var(--primary-color); background: var(--primary-light); }
    .option.correct { border-color: var(--success-color); background: rgba(46, 125, 50, 0.1); }
    .option.incorrect { border-color: var(--error-color); background: rgba(183, 28, 28, 0.1); }
    .option-letter { width: 36px; height: 36px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 15px; font-weight: 700; color: var(--dark-color); border: 2px solid var(--light-color); transition: var(--transition); }
    .option:hover .option-letter { border-color: var(--primary-color); background: var(--primary-color); color: white; }
    .option.selected .option-letter { background: var(--primary-color); color: white; border-color: var(--primary-color); }
    .option.correct .option-letter { background: var(--success-color); color: white; border-color: var(--success-color); }
    .option.incorrect .option-letter { background: var(--error-color); color: white; border-color: var(--error-color); }
    .option-text { flex: 1; font-size: 16px; }
    .feedback-container { margin: 30px 0; padding: 20px; border-radius: var(--radius); display: none; animation: fadeIn 0.5s ease; }
    .feedback-container.show { display: block; }
    .feedback-correct { background: rgba(46, 125, 50, 0.1); border-left: 4px solid var(--success-color); }
    .feedback-incorrect { background: rgba(183, 28, 28, 0.1); border-left: 4px solid var(--error-color); }
    .feedback-header { display: flex; align-items: center; margin-bottom: 10px; }
    .feedback-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 12px; font-size: 18px; flex-shrink: 0; }
    .feedback-correct .feedback-icon { background: var(--success-color); color: white; }
    .feedback-incorrect .feedback-icon { background: var(--error-color); color: white; }
    .feedback-title { font-weight: 700; font-size: 18px; }
    .feedback-explanation { margin-top: 10px; font-size: 15px; line-height: 1.6; color: var(--dark-color); }
    .controls { display: flex; justify-content: space-between; margin-top: 30px; }
    .btn { padding: 14px 32px; border: none; border-radius: var(--radius); font-size: 16px; font-weight: 600; cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 8px; }
    .btn-primary { background: var(--primary-color); color: white; }
    .btn-primary:hover:not(:disabled) { background: #b71c1c; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(198, 40, 40, 0.3); }
    .btn-secondary { background: var(--light-color); color: var(--dark-color); }
    .btn-secondary:hover { background: #e0e0e0; transform: translateY(-3px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
    .sidebar { display: flex; flex-direction: column; gap: 25px; }
    .stats-card, .hint-card, .navigation-card { background: white; border-radius: var(--radius); padding: 25px; box-shadow: var(--shadow); }
    .stats-card { border-top: 6px solid var(--primary-color); }
    .hint-card { border-top: 6px solid var(--warning-color); }
    .navigation-card { border-top: 6px solid var(--success-color); }
    .card-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .stat-item { text-align: center; padding: 15px; background: var(--light-color); border-radius: var(--radius); }
    .stat-value { font-size: 24px; font-weight: 700; color: var(--primary-color); display: block; }
    .stat-label { font-size: 13px; color: var(--gray-color); display: block; margin-top: 5px; }
    .hint-content { font-size: 14px; line-height: 1.6; color: var(--dark-color); }
    .question-list { max-height: 300px; overflow-y: auto; margin-top: 10px; }
    .question-nav-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: var(--light-color); border-radius: var(--radius); margin-bottom: 10px; cursor: pointer; transition: var(--transition); }
    .question-nav-item:hover { background: #e0e0e0; }
    .question-nav-item.active { background: var(--primary-light); border-left: 4px solid var(--primary-color); }
    .question-nav-number { font-weight: 600; color: var(--dark-color); }
    .question-nav-status { width: 10px; height: 10px; border-radius: 50%; background: var(--light-color); }
    .question-nav-status.correct { background: var(--success-color); }
    .question-nav-status.incorrect { background: var(--error-color); }
    .question-nav-status.current { background: var(--primary-color); }
    .completion-screen { max-width: 800px; margin: 50px auto; background: white; border-radius: var(--radius); padding: 50px; text-align: center; box-shadow: var(--shadow); animation: fadeIn 0.8s ease; }
    .completion-icon { font-size: 80px; color: var(--success-color); margin-bottom: 20px; animation: bounce 1s ease; }
    .completion-title { font-size: 32px; font-weight: 700; margin-bottom: 15px; color: var(--dark-color); }
    .completion-subtitle { font-size: 18px; color: var(--gray-color); margin-bottom: 40px; }
    .completion-stats { display: flex; justify-content: center; gap: 30px; margin-bottom: 40px; }
    .completion-stat-item { padding: 25px; background: var(--light-color); border-radius: var(--radius); min-width: 150px; }
    .completion-stat-value { font-size: 36px; font-weight: 700; color: var(--primary-color); display: block; }
    .completion-stat-label { font-size: 16px; color: var(--gray-color); margin-top: 8px; display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-20px); } 60% { transform: translateY(-10px); } }
    @media (max-width: 900px) { .container { grid-template-columns: 1fr; } .sidebar { order: -1; } }
    @media (max-width: 768px) { .question-container { padding: 25px; } .controls { flex-direction: column; gap: 15px; } .btn { width: 100%; justify-content: center; } .completion-stats { flex-direction: column; align-items: center; } }
  </style>

    const questions = [
  {id:1,title:"全面从严治党的核心是？",options:["全面","严","治","加强党的领导"],answer:2,explanation:"全面从严治党的核心是“治”。",tag:"全面从严治党",difficulty:"easy"},
  {id:2,title:"打铁必须自身硬，强调的是？",options:["党的纯洁性","党的先进性","党的政治建设","党的自我革命"],answer:3,explanation:"“打铁必须自身硬”强调的是党的自我革命精神。",tag:"全面从严治党",difficulty:"medium"},

    const questionTitleEl=document.getElementById('questionTitle'),questionNumberEl=document.getElementById('questionNumber'),questionDifficultyEl=document.getElementById('questionDifficulty'),optionsContainerEl=document.getElementById('optionsContainer'),feedbackContainerEl=document.getElementById('feedbackContainer'),feedbackIconEl=document.getElementById('feedbackIcon'),feedbackTitleEl=document.getElementById('feedbackTitle'),feedbackExplanationEl=document.getElementById('feedbackExplanation'),prevBtnEl=document.getElementById('prevBtn'),nextBtnEl=document.getElementById('nextBtn'),progressFillEl=document.getElementById('progressFill'),progressTextEl=document.getElementById('progressText'),answeredCountEl=document.getElementById('answeredCount'),correctCountEl=document.getElementById('correctCount'),accuracyRateEl=document.getElementById('accuracyRate'),remainingCountEl=document.getElementById('remainingCount'),questionNavEl=document.getElementById('questionNav'),completionScreenEl=document.getElementById('completionScreen'),finalCorrectCountEl=document.getElementById('finalCorrectCount'),finalTotalCountEl=document.getElementById('finalTotalCount'),finalAccuracyRateEl=document.getElementById('finalAccuracyRate');
    function init(){if(questions.length===0){questionTitleEl.textContent="题库正在建设中...";optionsContainerEl.innerHTML="<p style='color:var(--gray-color);text-align:center;padding:40px;'>请先添加题目</p>";nextBtnEl.disabled=true;prevBtnEl.disabled=true;return}userAnswers=new Array(questions.length).fill(null);loadQuestion();updateStats();generateQuestionNav()}
    function loadQuestion(){const question=questions[currentQuestionIndex];questionTitleEl.innerHTML=question.title;questionNumberEl.textContent=`第 ${currentQuestionIndex+1} 题`;questionDifficultyEl.textContent=question.difficulty==='easy'?'简单难度':question.difficulty==='medium'?'中等难度':'困难难度';questionDifficultyEl.className=`question-difficulty difficulty-${question.difficulty}`;optionsContainerEl.innerHTML='';question.options.forEach((option,index)=>{const optionDiv=document.createElement('div');optionDiv.className='option';if(userAnswers[currentQuestionIndex]!==null){if(index===question.answer)optionDiv.classList.add('correct');else if(index===userAnswers[currentQuestionIndex]&&userAnswers[currentQuestionIndex]!==question.answer)optionDiv.classList.add('incorrect');if(index===userAnswers[currentQuestionIndex])optionDiv.classList.add('selected')}const optionLetter=document.createElement('div');optionLetter.className='option-letter';optionLetter.textContent=String.fromCharCode(65+index);const optionText=document.createElement('div');optionText.className='option-text';optionText.innerHTML=option;optionDiv.appendChild(optionLetter);optionDiv.appendChild(optionText);if(userAnswers[currentQuestionIndex]===null)optionDiv.onclick=()=>selectAnswer(optionDiv,index);optionsContainerEl.appendChild(optionDiv)});if(userAnswers[currentQuestionIndex]!==null)showFeedback();else feedbackContainerEl.classList.remove('show');prevBtnEl.disabled=currentQuestionIndex===0;nextBtnEl.textContent=currentQuestionIndex===questions.length-1?'完成答题':'下一题';updateProgress();updateQuestionNav()}
    function selectAnswer(optionElement,answerIndex){const question=questions[currentQuestionIndex];const options=document.querySelectorAll('.option');options.forEach(option=>{option.onclick=null});optionElement.classList.add('selected');userAnswers[currentQuestionIndex]=answerIndex;if(answerIndex===question.answer)optionElement.classList.add('correct');else{optionElement.classList.add('incorrect');const correctOption=options[question.answer];correctOption.classList.add('correct')}showFeedback();updateStats();updateQuestionNav()}
    function showFeedback(){const question=questions[currentQuestionIndex],userAnswer=userAnswers[currentQuestionIndex],isCorrect=userAnswer===question.answer;feedbackIconEl.innerHTML=isCorrect?'✓':'✗';feedbackTitleEl.textContent=isCorrect?'回答正确！':'回答错误';feedbackExplanationEl.textContent=question.explanation;feedbackContainerEl.className=`feedback-container ${isCorrect?'feedback-correct':'feedback-incorrect'}`;feedbackContainerEl.classList.add('show')}
    function prevQuestion(){if(currentQuestionIndex>0){currentQuestionIndex--;loadQuestion()}}
    function nextQuestion(){if(userAnswers[currentQuestionIndex]===null){alert('请先选择答案');return}if(currentQuestionIndex<questions.length-1){currentQuestionIndex++;loadQuestion()}else{showCompletionScreen()}}
    function showCompletionScreen(){document.querySelector('.container').style.display='none';completionScreenEl.style.display='block';const totalQuestions=questions.length,correctAnswers=userAnswers.filter((answer,index)=>answer===questions[index].answer).length,accuracy=totalQuestions>0?Math.round((correctAnswers/totalQuestions)*100):0;finalCorrectCountEl.textContent=correctAnswers;finalTotalCountEl.textContent=totalQuestions;finalAccuracyRateEl.textContent=`${accuracy}%`;quizCompleted=true}
    function restartQuiz(){currentQuestionIndex=0;userAnswers=new Array(questions.length).fill(null);quizCompleted=false;completionScreenEl.style.display='none';document.querySelector('.container').style.display='grid';loadQuestion();updateStats();updateQuestionNav()}
    function updateProgress(){const progressPercentage=((currentQuestionIndex+1)/questions.length)*100;progressFillEl.style.width=`${progressPercentage}%`;progressTextEl.textContent=`${currentQuestionIndex+1}/${questions.length}`}
    function updateStats(){const totalQuestions=questions.length,answeredQuestions=userAnswers.filter(answer=>answer!==null).length,correctAnswers=userAnswers.filter((answer,index)=>answer===questions[index].answer).length,accuracy=answeredQuestions>0?Math.round((correctAnswers/answeredQuestions)*100):0;answeredCountEl.textContent=answeredQuestions;correctCountEl.textContent=correctAnswers;accuracyRateEl.textContent=`${accuracy}%`;remainingCountEl.textContent=totalQuestions-answeredQuestions}
    function generateQuestionNav(){questionNavEl.innerHTML='';questions.forEach((question,index)=>{const navItem=document.createElement('div');navItem.className='question-nav-item';if(index===currentQuestionIndex)navItem.classList.add('active');navItem.onclick=()=>{if(quizCompleted||userAnswers[index]!==null||index===currentQuestionIndex+1){currentQuestionIndex=index;loadQuestion()}else{alert('请按顺序答题')}};const navNumber=document.createElement('div');navNumber.className='question-nav-number';navNumber.textContent=`第 ${index+1} 题`;const navStatus=document.createElement('div');navStatus.className='question-nav-status';if(userAnswers[index]!==null)navStatus.classList.add(userAnswers[index]===question.answer?'correct':'incorrect');else if(index===currentQuestionIndex)navStatus.classList.add('current');navItem.appendChild(navNumber);navItem.appendChild(navStatus);questionNavEl.appendChild(navItem)})}
    function updateQuestionNav(){const navItems=document.querySelectorAll('.question-nav-item');navItems.forEach((item,index)=>{if(index===currentQuestionIndex)item.classList.add('active');else item.classList.remove('active');const statusIndicator=item.querySelector('.question-nav-status');statusIndicator.className='question-nav-status';if(userAnswers[index]!==null)statusIndicator.classList.add(userAnswers[index]===questions[index].answer?'correct':'incorrect');else if(index===currentQuestionIndex)statusIndicator.classList.add('current')})}
    document.addEventListener('keydown',function(e){if(completionScreenEl.style.display==='block')return;if(e.key>='1'&&e.key<='4'&&userAnswers[currentQuestionIndex]===null){const optionIndex=parseInt(e.key)-1,options=document.querySelectorAll('.option');if(optionIndex<options.length)options[optionIndex].click()}if((e.key==='ArrowLeft'||e.key==='a'||e.key==='A')&&currentQuestionIndex>0)prevQuestion();if((e.key==='ArrowRight'||e.key==='d'||e.key==='D')){if(currentQuestionIndex<questions.length-1)nextQuestion();else if(userAnswers[currentQuestionIndex]!==null)nextQuestion()}if((e.key===' '||e.key==='Enter')&&userAnswers[currentQuestionIndex]!==null)nextQuestion()});
    window.onload=init;
  </script>
</body>
</html>
